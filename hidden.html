<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隠しページ | bouquet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .hidden-content {
      text-align: center;
      padding: 5rem 2rem;
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, rgba(135, 206, 235, 0.06) 0%, rgba(240, 230, 210, 0.1) 100%), linear-gradient(to bottom, transparent 0%, rgba(135, 206, 235, 0.02) 100%);
      border-radius: 0 !important;
      box-shadow: none !important;
      border: none !important;
      background-color: transparent;
      position: relative;
      overflow: hidden;
    }
    
    .hidden-content::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(135, 206, 235, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .hidden-content h1 {
      font-size: 2.8rem;
      color: #87ceeb;
      margin-bottom: 1.5rem;
      font-family: 'Playfair Display', 'Noto Serif JP', serif;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.3;
      white-space: nowrap;
      animation: fadeInDown 0.8s ease-out;
      position: relative;
      z-index: 1;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    
    .hidden-content p {
      font-size: 1.6rem;
      color: #2a2a2a;
      margin-bottom: 2rem;
      font-family: 'Noto Serif JP', serif;
      font-weight: 400;
      line-height: 1.4;
      white-space: nowrap;
      animation: fadeInUp 0.8s ease-out 0.2s both;
      position: relative;
      z-index: 1;
    }
    
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .hidden-content a {
      display: inline-block;
      margin-top: 3rem;
      padding: 1.1rem 3rem;
      background: linear-gradient(90deg, #f0e6d2 0%, #e8d9bb 100%), url('images/rinen.jpg');
      background-size: 300px;
      background-blend-mode: multiply;
      color: #181818;
      text-decoration: none;
      border-radius: 0;
      font-size: 1.05rem;
      font-family: 'Noto Serif JP', serif;
      font-weight: 600;
      letter-spacing: 0.04em;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12), 0 14px 32px rgba(135, 206, 235, 0.14), 0 0 50px rgba(135, 206, 235, 0.08);
      transition: all 0.3s ease;
      animation: fadeInUp 0.8s ease-out 0.3s both;
      position: relative;
      z-index: 1;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .hidden-content a:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16), 0 16px 40px rgba(135, 206, 235, 0.2), 0 0 60px rgba(135, 206, 235, 0.12);
    }
    
    @media (max-width: 900px) {
      .hidden-content {
        padding: 3rem 1.5rem;
        min-height: 60vh;
      }
      
      .hidden-content h1 {
        font-size: 1.6rem;
        white-space: normal;
        margin-bottom: 1rem;
        line-height: 1.4;
      }
      
      .hidden-content p {
        font-size: 1.2rem;
        white-space: normal;
        margin-bottom: 1.5rem;
      }
      
      .hidden-content a {
        padding: 0.9rem 2.2rem;
        font-size: 0.95rem;
        margin-top: 2rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="images/water.jpg" alt="bouquetロゴ" class="site-logo" style="max-width:180px; width:40vw; height:auto; margin:1.2rem auto 0.5rem; display:block; filter:drop-shadow(0 2px 16px rgba(0,0,0,0.18));">
    <button class="menu-toggle" aria-label="メニューを開く"><span></span><span></span><span></span></button>
    <nav class="nav-menu">
      <ul>
        <li><a href="index.html">Home</a></li>

        <li><a href="trailer.html">Trailer</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="hidden-content fadein">
      <h1>✨ 隠しページへようこそ</h1>
      <p>小田原丈をよろしくお願いします。</p>
      <a href="index.html">トップページに戻る</a>
    </section>
  </main>
  <footer>
    <p>&copy; 2026 bouquet製作委員会</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
